<!DOCTYPE html>
<html lang="ar">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>لأجمل بنوته 🤭♥</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Amiri', serif;
}

body{
background:linear-gradient(180deg,#120012,#1b001b,#000);
color:white;
text-align:center;
min-height:100vh;
overflow-x:hidden;
}

/* خلفيات شفافة وردي */
.box, .card, .memory{
background:rgba(255,192,203,0.12);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
margin-top:15px;
}

/* شاشة الباسورد */
#passwordScreen{
position:fixed;
inset:0;
background:linear-gradient(135deg,#ff4d6d,#ff99ac,#ffccd5);
display:flex;
justify-content:center;
align-items:center;
z-index:1000;
}

.pass-box{
background:rgba(0,0,0,0.4);
padding:25px;
border-radius:20px;
}

/* أيقونة الموسيقى */
#musicIcon{
position:fixed;
top:15px;
right:15px;
font-size:24px;
cursor:pointer;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

/* قلوب */
.heart,.star{
position:fixed;
pointer-events:none;
}

.heart{
color:#ff4d6d;
animation:up 6s linear forwards;
}

.star{
color:white;
animation:up 8s linear forwards;
opacity:0.7;
}

@keyframes up{
0%{transform:translateY(0);opacity:0}
100%{transform:translateY(-120vh);opacity:0}
}

/* العداد */
.counter{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.counter div{
background:rgba(255,105,180,0.25);
padding:12px;
border-radius:15px;
}

/* كروت */
.cards{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:15px;
}

.card{
height:100px;
cursor:pointer;
position:relative;
transform-style:preserve-3d;
transition:0.6s;
}

.card.flip{
transform:rotateY(180deg);
}

.card .front,.card .back{
position:absolute;
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
backface-visibility:hidden;
border-radius:20px;
}

.card .back{
transform:rotateY(180deg);
color:#fff;
}

/* زرار */
button{
background:#ff4d6d;
color:white;
border:none;
padding:10px;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.hidden{display:none}

.resultBox{
margin-top:10px;
padding:10px;
border-radius:15px;
}

/* سؤال */
.yes{background:rgba(255,105,180,0.4)}
.no{background:rgba(255,0,0,0.4)}

</style>
</head>

<body>

<div id="musicIcon" onclick="toggleMusic()">🎵</div>

<!-- باسورد -->
<div id="passwordScreen">
<div class="pass-box">
<h2>ادخلي الباسورد ♥</h2>
<input type="password" id="pass">
<button onclick="checkPass()">دخول</button>
</div>
</div>

<!-- المحتوى -->
<div id="content" class="hidden">

<audio id="music" loop>
<source src="music.mp3">
</audio>

<h2>لأجمل بنوته ♥</h2>

<!-- ذكريات -->
<div class="memory">
<h3>💖 الذكريات</h3>
<p>🎂 تاريخ الميلاد: 10/2/2015</p>
<p>💕 تاريخ التعارف: 29/4/2025</p>
</div>

<!-- كروت -->
<div class="cards">

<div class="card" onclick="flip(this)">
<div class="front">❤️</div>
<div class="back">حبيتك</div>
</div>

<div class="card" onclick="flip(this)">
<div class="front">💔</div>
<div class="back">مش هحب</div>
</div>

<div class="card" onclick="flip(this)">
<div class="front">💭</div>
<div class="back">ولا هحب</div>
</div>

<div class="card" onclick="flip(this)">
<div class="front">👑</div>
<div class="back">حد قدك</div>
</div>

</div>

<!-- عداد -->
<div class="counter" id="counter"></div>

<!-- زر الرسالة -->
<button onclick="showMsg()">اضغطي هنا عايز اقولك حاجة</button>

<div id="msg" class="hidden box"></div>

<!-- سؤال -->
<div class="box">
<p>Do you love me?</p>
<button onclick="answer('yes')">Yes</button>
<button onclick="answer('no')">No</button>

<div id="answerBox" class="resultBox hidden"></div>
</div>

</div>

<script>

let music=document.getElementById("music");

/* باسورد */
function checkPass(){
let p=document.getElementById("pass").value;
if(p==="love"){
document.getElementById("passwordScreen").style.display="none";
document.getElementById("content").classList.remove("hidden");
music.play().catch(()=>{});
}
}

/* موسيقى */
function toggleMusic(){
if(music.paused) music.play();
else music.pause();
}

/* كروت */
function flip(card){
card.classList.toggle("flip");
}

/* رسالة */
function showMsg(){
let texts=[
"أنا مش بعرف أعيش من غيرك ❤️",
"إنتي أحلى حاجة حصلتلي ❤️",
"كل يوم بحبك أكتر ❤️",
"وجودك فرق في حياتي ❤️"
];

document.getElementById("msg").classList.remove("hidden");
document.getElementById("msg").innerHTML =
texts[Math.floor(Math.random()*texts.length)];
}

/* سؤال */
function answer(a){
let box=document.getElementById("answerBox");
box.classList.remove("hidden");

if(a==="yes"){
box.className="resultBox yes";
box.innerHTML="بحبك يا هبلة ❤️😂";
}else{
box.className="resultBox no";
box.innerHTML="اخص عليك 😡";
}
}

/* عداد تفصيلي */
const start=new Date("2025-04-29T07:27:00");

setInterval(()=>{
let now=new Date();
let diff=now-start;

let seconds=Math.floor(diff/1000);
let minutes=Math.floor(seconds/60);
let hours=Math.floor(minutes/60);
let days=Math.floor(hours/24);
let months=Math.floor(days/30);
let years=Math.floor(days/365);

document.getElementById("counter").innerHTML=`
<div>💖 ${years} سنة</div>
<div>💖 ${months} شهر</div>
<div>💖 ${days} يوم</div>
<div>💖 ${hours} ساعة</div>
<div>💖 ${minutes} دقيقة</div>
<div>💖 ${seconds} ثانية</div>
`;
},1000);

/* قلوب ونجوم */
function heart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
}

function star(){
let s=document.createElement("div");
s.className="star";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.animationDuration=(5+Math.random()*5)+"s";
document.body.appendChild(s);
setTimeout(()=>s.remove(),9000);
}

setInterval(heart,500);
setInterval(star,900);

</script>

</body>
  </html>
